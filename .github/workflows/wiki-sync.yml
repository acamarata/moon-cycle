name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - .github/wiki/**

jobs:
  sync:
    name: Sync .github/wiki/ to GitHub Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Sync wiki pages
        uses: Andrew-Chen-Wang/github-wiki-action@v4
        with:
          path: .github/wiki/
          token: ${{ secrets.GITHUB_TOKEN }}
